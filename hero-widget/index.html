<!--
  WIDGET: Revenue Academy Hero Top Bar
  Paste this entire block into Docebo Homepage Builder > Add Widget > HTML/WYSIWYG
-->

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  /* ─── Reset & Tokens ─── */
  .ra-hero *, .ra-hero *::before, .ra-hero *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .ra-hero {
    --blue: #01C4F6;
    --navy: #101E2B;
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.5);
    --border-subtle: rgba(255,255,255,0.1);
    --inverted: #0B1114;
    --font-head: 'Cera Pro', 'Open Sans', sans-serif;
    --font-body: 'Open Sans', sans-serif;
    --radius: 10px;
    --btn-radius: 6px;

    font-family: var(--font-body);
    background: url('../assets/blue-background.png') center center / cover no-repeat;
    color: var(--text);
    border-radius: var(--radius);
    padding: 40px 70px;
    position: relative;
    overflow: hidden;
  }

  /* ─── Layout ─── */
  .ra-hero__inner {
    display: flex;
    align-items: center;
    gap: 66px;
    position: relative;
    z-index: 1;
  }

  .ra-hero__left {
    display: flex;
    align-items: center;
    gap: 70px;
    flex: 1 1 0%;
    min-width: 0;
  }

  /* ─── Badge Column ─── */
  .ra-hero__badge-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 200px;
  }

  .ra-hero__badge-img {
    width: 200px;
    height: auto;
    display: block;
  }

  /* ─── Text Column ─── */
  .ra-hero__text {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ra-hero__label {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .ra-hero__subhead {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1.4;
  }

  .ra-hero__title {
    font-family: var(--font-head);
    font-size: clamp(32px, 3.5vw, 48px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.96px;
    margin-top: 8px;
  }

  /* ─── Buttons ─── */
  .ra-hero__actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
  }

  .ra-hero__btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 48px;
    padding: 0 16px;
    border-radius: var(--btn-radius);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .ra-hero__btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .ra-hero__btn:active { transform: translateY(0); }

  .ra-hero__btn--primary {
    background: linear-gradient(to bottom, #61dfff, #01c4f6);
    color: var(--inverted);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), inset 0 -1px 0 rgba(11,17,20,0.2);
  }

  .ra-hero__btn--secondary {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .ra-hero__btn svg { flex-shrink: 0; }

  /* ─── Video Card ─── */
  .ra-hero__video {
    flex: 0 0 42%;
    min-width: 420px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 0.5px solid #757575;
    position: relative;
    background: var(--inverted);
  }

  .ra-hero__video-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: #fff;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    line-height: 1;
  }

  /* ─── Vimeo Embed ─── */
  .ra-hero__vimeo-wrap {
    padding: 56.25% 0 0 0;
    position: relative;
  }

  .ra-hero__vimeo-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .ra-hero__video-meta {
    padding: 16px 24px;
  }

  .ra-hero__video-title {
    font-family: 'Inter', 'Open Sans', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.45px;
    margin-bottom: 4px;
  }

  .ra-hero__video-sub {
    font-family: 'Inter', 'Open Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.15px;
  }

  /* ─── Responsive ─── */
  @media (max-width: 1100px) {
    .ra-hero { padding: 32px 40px; }
    .ra-hero__inner { gap: 40px; }
    .ra-hero__left { gap: 40px; }
    .ra-hero__video { flex: 0 0 45%; min-width: 300px; }
  }

  @media (max-width: 768px) {
    .ra-hero { padding: 24px 20px; }
    .ra-hero__inner { flex-direction: column; align-items: stretch; }
    .ra-hero__left { flex-direction: column; align-items: center; text-align: center; gap: 24px; }
    .ra-hero__text { align-items: center; }
    .ra-hero__actions { justify-content: center; }
    .ra-hero__video { flex: 1 1 100%; min-width: 0; max-width: 100%; }
    .ra-hero__badge-col { width: 140px; }
    .ra-hero__badge-img { width: 140px; }
  }
</style>

<div class="ra-hero">
  <div class="ra-hero__inner">

    <!-- ── Left: Badge + Text ── -->
    <div class="ra-hero__left">

      <!-- Badge Column -->
      <div class="ra-hero__badge-col">
        <img class="ra-hero__badge-img"
             alt="Revenue Academy"
             src="../assets/RA header.png">
      </div>

      <!-- Text Column -->
      <div class="ra-hero__text">
        <p class="ra-hero__label">TRAINING FOR MODERN GTM TEAMS</p>
        <p class="ra-hero__subhead">Revenue Academy</p>
        <h1 class="ra-hero__title">Welcome back!</h1>

        <div class="ra-hero__actions">
          <a href="https://winningbydesign.docebosaas.com/learn/mycourses" 
   target="_blank" 
   class="ra-hero__btn ra-hero__btn--primary">
  <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  Resume Learning
</a>
<a href="https://winningbydesign.docebosaas.com/learn/my-calendar" 
   target="_blank" 
   class="ra-hero__btn ra-hero__btn--secondary">
  <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  Upcoming Training
</a>

        </div>
      </div>
    </div>

    <!-- ── Right: Video Card ── -->
    <div class="ra-hero__video" id="ra-video-card">
      <button class="ra-hero__video-close"
              aria-label="Close video"
              onclick="document.getElementById('ra-video-card').style.display='none'">&times;</button>

      <!-- Vimeo Embed -->
      <div class="ra-hero__vimeo-wrap">
        <iframe
          src="https://vimeo.com/1179745050?fl=ip&fe=ec"
          frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          title="Revenue Academy Welcome Video">
        </iframe>
      </div>

      <div class="ra-hero__video-meta">
        <p class="ra-hero__video-title">Welcome to the Revenue Academy</p>
        <p class="ra-hero__video-sub">A message from Jacco &middot; 4 min</p>
      </div>
    </div>

  </div>
</div>

<script src="https://player.vimeo.com/api/player.js"></script>
